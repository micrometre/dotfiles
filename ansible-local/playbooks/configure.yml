---
- name: Configure Bare Metal 
  hosts: localhost
  become: true
  gather_facts: true
  
  roles:
    - { role: common, tags: ["common", "setup"] }
    - { role: docker, tags: ["docker", "setup"] }
    - { role: nodejs, tags: ["nodejs", "setup"], become: false }
    - { role: python, tags: ["python", "setup"] }
    - { role: dotfiles, tags: ["dotfiles", "setup"], become: false }
    - { role: virtualization, tags: ["virtualization", "setup"], become: false }
    - { role: vm-manager, tags: ["vm-manager", "setup"] }
    - { role: android-dev, tags: ["android-dev", "setup"], become: false }
    - { role: dart-flutter, tags: ["dart-flutter", "setup"] }
  
  post_tasks:
    - name: Display configuration status
      debug:
        msg: |
          ========================================
          Configuration Complete!
          ========================================
          Hostname: {{ ansible_facts.hostname }}
          IP Address: {{ ansible_host }}
          OS: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
          Python: {{ ansible_facts.python_version }}
          ========================================
          
          Next steps:
          - Add more roles to this playbook as needed
          - Run 'make deploy' when ready to deploy the application
          ========================================
