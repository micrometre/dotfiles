---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: false

- name: Deploy fail2ban jails for Docker nginx logs
  ansible.builtin.template:
    src: jail.d/docker-nginx.conf.j2
    dest: /etc/fail2ban/jail.d/docker-nginx.conf
    owner: root
    group: root
    mode: "0644"
  when: fail2ban_nginx_http_auth_enabled | bool or fail2ban_nginx_botsearch_enabled | bool
  notify: restart fail2ban

- name: Remove docker-nginx jail config when all nginx jails are disabled
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d/docker-nginx.conf
    state: absent
  when: not (fail2ban_nginx_http_auth_enabled | bool or fail2ban_nginx_botsearch_enabled | bool)
  notify: restart fail2ban

- name: Ensure fail2ban service is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: "{{ fail2ban_service_state }}"
    enabled: "{{ fail2ban_service_enabled }}"
